<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Good Story Studios — Monthly Film Slate Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>@media only screen and (max-width:760px){.gss-card{border-radius:0!important;}.gss-wrap{padding:0!important;}}</style>
  

  
</head>
<body style="margin:0;padding:0;background-color:#F7F8FC;font-family:'Nunito',Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <!-- Preheader text (hidden) -->
  <div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#F7F8FC;mso-hide:all;">
    Your monthly studio film slate from Good Story Studios — releases, dates & studio contacts ✦
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="gss-wrap" style="background-color:#F7F8FC;padding:32px 0;">
    <tbody><tr>
      <td align="center" valign="top">

        <!-- Main email card -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="gss-card" style="max-width:900px;width:100%;background-color:#FFFFFF;border-radius:24px;overflow:hidden;box-shadow:0 6px 32px rgba(107,144,217,0.12);">

          <!-- ══ HEADER ══ -->
          <tbody><tr>
            <td style="padding:44px 52px 0 52px;text-align:center;background-color:#FFFFFF;">

              <!-- Logo pill -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto 22px auto;">
                <tbody><tr>
                  <td bgcolor="#6B90D9" style="background-color:#6B90D9;border-radius:50px;padding:12px 28px;">
                    <span style="font-family:'Nunito',Arial,sans-serif;font-size:20px;font-weight:900;color:#FFFFFF;letter-spacing:-0.4px;">✦&nbsp;Good Story</span><span style="font-family:'Nunito',Arial,sans-serif;font-size:20px;font-weight:700;color:#F2C53D;letter-spacing:-0.4px;">&nbsp;Studios</span>
                  </td>
                </tr>
              </tbody></table>

              <!-- Newsletter title -->
              <h1 style="margin:0 0 4px 0;font-family:'Nunito',Arial,sans-serif;font-size:30px;font-weight:900;color:#6B90D9;line-height:1.15;letter-spacing:-0.5px;">
                Monthly Film Slate
              </h1>
              <p style="margin:0 0 30px 0;font-family:'Nunito',Arial,sans-serif;font-size:17px;font-weight:700;color:#B5C9F0;letter-spacing:0.5px;">
                {{MONTH_YEAR}}
              </p>

              <!-- Yellow accent divider -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tbody><tr>
                  <td style="height:4px;background-color:#F2C53D;border-radius:4px;"></td>
                </tr>
              </tbody></table>

            </td>
          </tr>

          <!-- ══ STUDIO BLOCKS ══ -->
          <tr>
            <td style="padding:36px 52px 8px 52px;">

{{STUDIO_BLOCKS}}

            </td>
          </tr>

          
          <!-- ══ FOOTER ══ -->
          <tr>
            <td style="padding:32px 52px 44px 52px;text-align:center;background-color:#FFFFFF;">

              <!-- Pink divider -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:22px;">
                <tbody><tr>
                  <td style="height:2px;background-color:#EE9BB5;border-radius:2px;"></td>
                </tr>
              </tbody></table>

              <p style="margin:0 0 6px 0;font-family:'Nunito',Arial,sans-serif;font-size:13px;font-weight:700;color:#C0C8D8;line-height:1.8;">
                Good Story Studios &nbsp;·&nbsp;
                <a href="https://itsgoodstory.com" style="color:#6B90D9;text-decoration:none;font-weight:700;">itsgoodstory.com</a>
                &nbsp;·&nbsp; {{GENERATED_DATE}}
              </p>
              <p style="margin:0;font-family:'Nunito',Arial,sans-serif;font-size:12px;font-weight:600;color:#D5DCE8;line-height:1.6;">
                You're receiving this as part of the Good Story creator network.
              </p>

            </td>
          </tr>

        </tbody></table>
        <!-- /Main email card -->

      </td>
    </tr>
  </tbody></table>



</body></html>
